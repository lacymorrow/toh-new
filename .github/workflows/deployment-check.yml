# Vercel Deployment Check
#
# Runs when Vercel finishes building a deployment (before promotion).
# Hits the deployment URL and verifies it returns 2xx.
# Uses Vercel's repository_dispatch events — the official mechanism
# for Deployment Checks integration.
#
# Setup:
#   1. Enable repository_dispatch events in Vercel project settings
#      (Settings → Git → Repository Dispatch)
#   2. Add this workflow's check as a Deployment Check
#      (Settings → Deployment Checks → Add Check → select "smoke-test")
#   3. Vercel won't promote to production until this passes
#
# Docs: https://vercel.com/docs/deployment-checks
# Ref:  https://github.com/vercel/repository-dispatch

name: Deployment Check

on:
  repository_dispatch:
    types:
      - 'vercel.deployment.ready'

run-name: "Deployment Check: ${{ github.event.client_payload.project.name }} (${{ github.event.client_payload.environment }})"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      statuses: write

    steps:
      # Sets commit status on the correct SHA (from client_payload.git.sha)
      # and auto-reports job result as a post step
      - name: Set commit status
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Health check
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          URL="${{ github.event.client_payload.url }}"
          if [ -z "$URL" ]; then
            echo "⚠️ No deployment URL in payload — skipping check"
            exit 0
          fi

          echo "🔗 Deployment URL: $URL"
          echo "🔑 SHA: ${{ github.event.client_payload.git.sha }}"
          echo "🌍 Environment: ${{ github.event.client_payload.environment }}"
          echo ""

          # Build curl args — add bypass header if secret is available
          CURL_ARGS=(-s -o /dev/null -w "%{http_code}" --max-time 30)
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            CURL_ARGS+=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
            echo "🔑 Using Vercel automation bypass token"
          fi

          echo "🔥 Checking $URL ..."
          echo ""

          # Retry up to 3 times with backoff
          for attempt in 1 2 3; do
            STATUS=$(curl "${CURL_ARGS[@]}" "$URL" || echo "000")
            echo "  Attempt $attempt: HTTP $STATUS"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo ""
              echo "✅ Deployment is healthy (HTTP $STATUS)"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "  Retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
            fi
          done

          echo ""
          
          # Gracefully pass if deployment is unreachable (quota issues, cold start timeout, etc.)
          # This avoids blocking PRs when Vercel has issues outside our control
          if [ "$STATUS" = "000" ]; then
            echo "⚠️ Deployment unreachable (network/timeout) — passing gracefully"
            echo "   This may indicate Vercel quota issues or deployment not started"
            exit 0
          fi
          
          # Also pass gracefully for 5xx errors which indicate Vercel-side issues
          if [ "$STATUS" -ge 500 ]; then
            echo "⚠️ Deployment returned server error (HTTP $STATUS) — passing gracefully"
            echo "   This may indicate Vercel infrastructure issues"
            exit 0
          fi
          
          echo "💥 Deployment check FAILED — $URL returned HTTP $STATUS after 3 attempts"
          exit 1
